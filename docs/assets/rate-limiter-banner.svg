<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a0f2e"/>
    </linearGradient>

    <!-- Ring segment gradients -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd32a"/>
      <stop offset="100%" style="stop-color:#f9ca24"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0be881"/>
      <stop offset="100%" style="stop-color:#05c46b"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2d3"/>
      <stop offset="100%" style="stop-color:#0097a7"/>
    </linearGradient>
    <linearGradient id="g5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe"/>
      <stop offset="100%" style="stop-color:#6c5ce7"/>
    </linearGradient>
    <linearGradient id="g6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fd79a8"/>
      <stop offset="100%" style="stop-color:#e84393"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Inner shadow -->
    <radialGradient id="inner-shadow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.4"/>
    </radialGradient>

    <!-- Floor reflection gradient -->
    <linearGradient id="floor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a29bfe;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:0"/>
    </linearGradient>

    <clipPath id="ring-clip">
      <circle cx="280" cy="200" r="148"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
  </g>

  <!-- ── 3D Ring Buffer ── -->
  <!-- Shadow / floor ellipse -->
  <ellipse cx="280" cy="355" rx="140" ry="18" fill="#6c5ce7" opacity="0.18" filter="url(#softglow)"/>

  <!-- Ring segments (6 slots = limit of 6) -->
  <!-- Each arc: cx=280, cy=200, outer r=148, inner r=90, gap between segments -->

  <!-- Segment 1 — red (oldest, head) -->
  <path d="M280,200 L392,133 A148,148 0 0,1 428,200 L348,200 A68,68 0 0,0 324,159 Z"
        fill="url(#g1)" filter="url(#glow)" opacity="0.95"/>
  <!-- top face highlight -->
  <path d="M392,133 A148,148 0 0,1 428,200 L348,200 A68,68 0 0,0 324,159 Z"
        fill="#ffffff" opacity="0.08"/>

  <!-- Segment 2 — yellow -->
  <path d="M280,200 L428,200 A148,148 0 0,1 392,267 L324,241 A68,68 0 0,0 348,200 Z"
        fill="url(#g2)" filter="url(#glow)" opacity="0.95"/>
  <path d="M428,200 A148,148 0 0,1 392,267 L324,241 A68,68 0 0,0 348,200 Z"
        fill="#ffffff" opacity="0.06"/>

  <!-- Segment 3 — green -->
  <path d="M280,200 L392,267 A148,148 0 0,1 280,348 L280,270 A68,68 0 0,0 324,241 Z"
        fill="url(#g3)" filter="url(#glow)" opacity="0.95"/>
  <path d="M392,267 A148,148 0 0,1 280,348 L280,270 A68,68 0 0,0 324,241 Z"
        fill="#ffffff" opacity="0.06"/>

  <!-- Segment 4 — cyan (expired, will be reclaimed) -->
  <path d="M280,200 L280,348 A148,148 0 0,1 168,267 L236,241 A68,68 0 0,0 280,270 Z"
        fill="url(#g4)" filter="url(#glow)" opacity="0.55"/>
  <path d="M280,348 A148,148 0 0,1 168,267 L236,241 A68,68 0 0,0 280,270 Z"
        fill="#ffffff" opacity="0.04"/>

  <!-- Segment 5 — purple (expired) -->
  <path d="M280,200 L168,267 A148,148 0 0,1 132,200 L212,200 A68,68 0 0,0 236,241 Z"
        fill="url(#g5)" filter="url(#glow)" opacity="0.35"/>
  <path d="M168,267 A148,148 0 0,1 132,200 L212,200 A68,68 0 0,0 236,241 Z"
        fill="#ffffff" opacity="0.03"/>

  <!-- Segment 6 — pink (expired, oldest) -->
  <path d="M280,200 L132,200 A148,148 0 0,1 168,133 L236,159 A68,68 0 0,0 212,200 Z"
        fill="url(#g6)" filter="url(#glow)" opacity="0.25"/>
  <path d="M132,200 A148,148 0 0,1 168,133 L236,159 A68,68 0 0,0 212,200 Z"
        fill="#ffffff" opacity="0.03"/>

  <!-- Gap fill for last segment back to start -->
  <path d="M280,200 L168,133 A148,148 0 0,1 280,52 L280,130 A68,68 0 0,0 236,159 Z"
        fill="#1a1a2e" opacity="0.9"/>

  <!-- Inner circle (donut hole) -->
  <circle cx="280" cy="200" r="90" fill="#0f0f1a"/>
  <circle cx="280" cy="200" r="90" fill="url(#inner-shadow)"/>

  <!-- Inner ring stroke -->
  <circle cx="280" cy="200" r="90" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <circle cx="280" cy="200" r="148" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Center label -->
  <text x="280" y="193" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.5">ring buffer</text>
  <text x="280" y="212" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#ffffff" opacity="0.85">limit = 6</text>

  <!-- HEAD arrow -->
  <g filter="url(#glow)">
    <line x1="358" y1="108" x2="390" y2="88" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.8"/>
    <text x="395" y="85" font-family="monospace" font-size="11" fill="#ff6b6b" opacity="0.9">← head (oldest)</text>
  </g>

  <!-- Expired label -->
  <text x="115" y="290" font-family="monospace" font-size="10" fill="#a29bfe" opacity="0.6">expired →</text>

  <!-- ── Right side: text panel ── -->
  <g transform="translate(490, 60)">

    <!-- Title -->
    <text font-family="'SF Mono', 'Fira Code', monospace" font-size="26" font-weight="bold" fill="#ffffff" letter-spacing="-0.5">
      <tspan x="0" dy="0">Sliding Window</tspan>
      <tspan x="0" dy="34">Rate Limiter</tspan>
    </text>

    <!-- Divider -->
    <line x1="0" y1="82" x2="260" y2="82" stroke="#a29bfe" stroke-width="1" opacity="0.4"/>

    <!-- Stats -->
    <g font-family="monospace" font-size="13">
      <!-- O(1) -->
      <rect x="0" y="96" width="90" height="28" rx="6" fill="#a29bfe" opacity="0.15"/>
      <text x="10" y="115" fill="#a29bfe" font-weight="bold">O(1)</text>
      <text x="50" y="115" fill="#ffffff" opacity="0.5">time</text>

      <!-- Zero GC -->
      <rect x="104" y="96" width="100" height="28" rx="6" fill="#0be881" opacity="0.15"/>
      <text x="114" y="115" fill="#0be881" font-weight="bold">zero GC</text>

      <!-- Java 21 -->
      <rect x="0" y="134" width="100" height="28" rx="6" fill="#00d2d3" opacity="0.15"/>
      <text x="10" y="153" fill="#00d2d3" font-weight="bold">Java 21+</text>

      <!-- single-threaded -->
      <rect x="114" y="134" width="142" height="28" rx="6" fill="#fd79a8" opacity="0.15"/>
      <text x="124" y="153" fill="#fd79a8" font-weight="bold">single-thread</text>
    </g>

    <!-- Code snippet -->
    <rect x="0" y="178" width="285" height="84" rx="8" fill="#ffffff" opacity="0.04"/>
    <rect x="0" y="178" width="285" height="84" rx="8" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    <text font-family="monospace" font-size="11.5" fill="#ffffff">
      <tspan x="14" dy="198" fill="#a29bfe">var</tspan>
      <tspan fill="#ffffff"> limiter </tspan>
      <tspan fill="#fd79a8">=</tspan>
      <tspan fill="#ffffff"> new </tspan>
      <tspan fill="#ffd32a">SlidingWindow</tspan>
    </text>
    <text font-family="monospace" font-size="11.5">
      <tspan x="14" dy="218" fill="#ffd32a">  RateLimiter</tspan>
      <tspan fill="#ffffff">(</tspan>
      <tspan fill="#0be881">100</tspan>
      <tspan fill="#ffffff">, </tspan>
      <tspan fill="#0be881">1_000L</tspan>
      <tspan fill="#ffffff">,</tspan>
    </text>
    <text font-family="monospace" font-size="11.5">
      <tspan x="14" dy="238" fill="#00d2d3">    System</tspan>
      <tspan fill="#ffffff">::</tspan>
      <tspan fill="#00d2d3">currentTimeMillis</tspan>
      <tspan fill="#ffffff">);</tspan>
    </text>
    <text font-family="monospace" font-size="11.5">
      <tspan x="14" dy="254" fill="#a29bfe">boolean</tspan>
      <tspan fill="#ffffff"> ok </tspan>
      <tspan fill="#fd79a8">=</tspan>
      <tspan fill="#ffffff"> limiter.</tspan>
      <tspan fill="#ffd32a">tryAcquire</tspan>
      <tspan fill="#ffffff">();</tspan>
    </text>

    <!-- Claude badge -->
    <g transform="translate(0, 278)">
      <rect width="285" height="36" rx="8" fill="#6c5ce7" opacity="0.2"/>
      <rect width="285" height="36" rx="8" fill="none" stroke="#6c5ce7" stroke-width="0.8" opacity="0.5"/>
      <text x="14" y="23" font-family="monospace" font-size="11" fill="#a29bfe">⚡ Built by Claude Sonnet 4.6 · claude-sonnet-4-6</text>
    </g>
  </g>
</svg>
